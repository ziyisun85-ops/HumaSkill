gmt:
  root: G:/Code/Python/Paper-Reproduction/GMT/humanoid-general-motion-tracking
  robot: g1
  model_path: assets/robots/g1/g1.xml
  policy_path: assets/pretrained_checkpoints/pretrained.pt
  device: auto

runtime:
  output_root: outputs
  stop_on_failure: true
  keep_single_episode: true
  require_m0_contract: true

skillmotion:
  enabled: false
  library_root: skillmotion_library
  tracker_spec: configs/trackers/gmt_g1.yaml

motion_assets:
  root: assets/motions
  valid_motion_files:
    - airkick_stand.pkl
    - basic_walk.pkl
    - crouchwalk_stand.pkl
    - dance.pkl
    - dance_waltz.pkl
    - kick_walk.pkl
    - squat.pkl
    - walk_stand.pkl

sequence:
  default_task: configs/sequences/demo_walk_kick_crouch_stand.yaml
  transition: static_transition_config
  validator: reference_frames_shape_check

reference_contract:
  status: completed_m0
  root_reference_mode: absolute_root
  reanchor_skill_clip: true
  reanchor_yaw_only: true
  reference_velocity_policy: derive_like_motion_lib
  local_body_pos_policy: preserve_not_used_by_runner_obs

runner_timing:
  control_dt: 0.02
  physics_dt: 0.001
  decimation: 20
  reference_fps: 30.0
  reference_time_indexing: motionlib_loop_phase_blend
  obs_history: 20
  obs_normalization: explicit_scales_only

fall_detection:
  enabled: true
  min_root_height: 0.20
  max_body_tilt: 120.0

execution_monitor:
  enabled: true
  low_success_margin: 0.30
  max_seam_velocity: 0.10
  max_abs_tilt: 1.0
  max_tracking_maje: 0.20
  recovery:
    default_reentry_skill: stable_stand_bridge

initial_stabilization:
  enabled: true
  stand_ready_skill: stable_stand_bridge
  blend_frames: 30
  hold_frames: 15
  preserve_initial_root_height: false
  reset_to_stand_ready: true
  action_ramp_frames: 30

transition_planner:
  enabled: true
  stand_ready_skill: stable_stand_bridge
  skip_bridge:
    max_dof_pos_mean_diff: 0.15
    max_root_height_diff: 0.08
    max_roll_pitch: 0.15
    max_root_lin_vel: 0.25
    max_dof_vel_norm: 2.5
    # measured stand_ready -> airkick frame 0 mean dof gap is 0.3126 rad; the
    # proven bridge-post hermite already crosses that gap in 24 frames
    max_target_entry_dof_diff: 0.40
  short_interp:
    num_frames: 24
    interpolation_mode: hermite
    hermite_tension: 1.0

matching:
  mode: pose_search         # "static" | "pose_search"
  search_window: 60
  score_weights:
    dof_pos: 1.0
    root_quat: 0.3
    velocity: 0.2
    root_height: 0.8

platform:
  verified:
    - linux
    - m1_macos
  windows_status: unverified
