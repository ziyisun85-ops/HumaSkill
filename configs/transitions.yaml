# Fallback/default transition specs only. At runtime the middle-layer
# TransitionPlanner (configs/harness.yaml: transition_planner) decides the
# effective transition from the live RobotState; e.g. it may replace the
# walk_forward -> kick_leg bridge with a short Hermite interpolation when
# the robot is already near stable stand_ready.
task_id: demo_walk_kick_crouch_stand

transitions:
  - from_skill: walk_forward
    to_skill: kick_leg
    mode: bridge
    bridge_skill: stable_stand_bridge
    pre_bridge_interp_frames: 20
    post_bridge_interp_frames: 24
    reason: walking_to_standing_kick_needs_stable_stand_reference

  - from_skill: kick_leg
    to_skill: crouch_down
    mode: interpolation
    num_frames: 24
    interpolation_mode: hermite
    hermite_tension: 0.1
    reason: standing_kick_to_squat_uses_short_interpolation

  - from_skill: crouch_down
    to_skill: stand_up
    mode: interpolation
    num_frames: 20
    interpolation_mode: hermite
    hermite_tension: 0.8
    reason: squat_to_standing_uses_short_interpolation
